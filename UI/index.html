<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexConvert — Minimalist Exchange Terminal</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            zinc: {
              950: '#09090b',
              900: '#18181b',
              800: '#27272a',
              700: '#3f3f46',
              400: '#a1a1aa',
              100: '#f4f4f5',
            },
            accent: {
              500: '#6366f1', /* Indigo primary accent */
              600: '#4f46e5',
            }
          }
        }
      }
    }
  </script>
  
  <!-- Inter & JetBrains Mono Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .mono-font {
      font-family: 'JetBrains Mono', monospace;
    }
    /* Simple Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #09090b;
    }
    ::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3f3f46;
    }
  </style>
</head>

<body class="bg-zinc-950 text-zinc-100 min-h-screen transition-colors duration-200 selection:bg-accent-600/30">

  <!-- Top Minimal Header -->
  <header class="border-b border-zinc-800 bg-zinc-950/80 backdrop-blur-md sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="text-accent-500">
          <i data-lucide="shuffle" class="w-5 h-5"></i>
        </div>
        <div class="flex items-baseline gap-2">
          <span class="text-base font-bold tracking-tight text-zinc-100">ApexConvert</span>
          <span class="text-[10px] text-zinc-500 font-mono tracking-widest uppercase">Engine v2.4</span>
        </div>
      </div>

      <!-- Quick status indicator & Toolbar -->
      <div class="flex items-center gap-4">
        <div class="hidden sm:flex items-center gap-2 text-xs text-zinc-400 font-mono">
          <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>
          <span>OFFLINE LEDGER ACTIVE</span>
        </div>
        
        <div class="h-4 w-[1px] bg-zinc-800 hidden sm:block"></div>

        <button id="soundToggle" onclick="toggleSound()" title="Toggle Interface Audio Feedback"
          class="p-2 rounded-lg border border-zinc-800 bg-zinc-900 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 active:scale-95 transition-all">
          <i id="soundIcon" data-lucide="volume-2" class="w-4 h-4"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Grid Layout -->
  <main class="max-w-6xl mx-auto px-4 py-6">
    
    <!-- Flat Mini Metrics Strip -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
      <div class="bg-zinc-900 p-4 rounded-lg border border-zinc-800/80">
        <span class="text-[10px] text-zinc-500 uppercase tracking-wider block font-medium">Archived Volume</span>
        <span id="metricVolume" class="text-sm font-bold tracking-tight text-zinc-200 block mt-1 mono-font">$0.00</span>
      </div>
      <div class="bg-zinc-900 p-4 rounded-lg border border-zinc-800/80">
        <span class="text-[10px] text-zinc-500 uppercase tracking-wider block font-medium">Logged Transactions</span>
        <span id="metricCount" class="text-sm font-bold tracking-tight text-zinc-200 block mt-1 mono-font">0</span>
      </div>
      <div class="bg-zinc-900 p-4 rounded-lg border border-zinc-800/80">
        <span class="text-[10px] text-zinc-500 uppercase tracking-wider block font-medium">Primary Base</span>
        <span id="metricBase" class="text-sm font-bold tracking-tight text-zinc-200 block mt-1">USD 🇺🇸</span>
      </div>
      <div class="bg-zinc-900 p-4 rounded-lg border border-zinc-800/80">
        <span class="text-[10px] text-zinc-500 uppercase tracking-wider block font-medium">Direct Cross-rate</span>
        <span id="metricRate" class="text-sm font-bold tracking-tight text-zinc-200 block mt-1 mono-font">300.50 LKR</span>
      </div>
    </div>

    <!-- Dual Column Workspace -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
      
      <!-- Left Column: Converter Core -->
      <section class="lg:col-span-7 space-y-4">
        
        <!-- Standard Quick Channels -->
        <div class="bg-zinc-900 p-3 rounded-lg border border-zinc-800 flex flex-wrap items-center gap-2">
          <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider mr-2">Preset Routing:</span>
          <div class="flex flex-wrap gap-1.5">
            <button onclick="loadFastPair('USD', 'LKR')" class="px-2.5 py-1 text-xs font-medium rounded bg-zinc-800 border border-zinc-700/50 hover:bg-zinc-700 text-zinc-300 transition">
              USD ➔ LKR
            </button>
            <button onclick="loadFastPair('EUR', 'USD')" class="px-2.5 py-1 text-xs font-medium rounded bg-zinc-800 border border-zinc-700/50 hover:bg-zinc-700 text-zinc-300 transition">
              EUR ➔ USD
            </button>
            <button onclick="loadFastPair('GBP', 'EUR')" class="px-2.5 py-1 text-xs font-medium rounded bg-zinc-800 border border-zinc-700/50 hover:bg-zinc-700 text-zinc-300 transition">
              GBP ➔ EUR
            </button>
            <button onclick="loadFastPair('USD', 'INR')" class="px-2.5 py-1 text-xs font-medium rounded bg-zinc-800 border border-zinc-700/50 hover:bg-zinc-700 text-zinc-300 transition">
              USD ➔ INR
            </button>
          </div>
        </div>

        <!-- Main Exchange Box -->
        <div class="bg-zinc-900 rounded-lg p-5 sm:p-6 border border-zinc-800">
          
          <div class="flex items-center justify-between mb-5 pb-3 border-b border-zinc-800">
            <div class="flex items-center gap-2">
              <i data-lucide="calculator" class="w-4 h-4 text-zinc-400"></i>
              <h2 class="text-sm font-bold tracking-tight text-zinc-200">Exchange Tool</h2>
            </div>
            
            <button onclick="resetInputs()" class="text-xs text-zinc-500 hover:text-zinc-300 flex items-center gap-1 transition">
              <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> Clear Inputs
            </button>
          </div>

          <!-- Fields Stack -->
          <div class="space-y-4">
            
            <!-- Amount block -->
            <div>
              <label for="amount" class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1.5">Exchange Amount</label>
              <div class="relative rounded-lg">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-zinc-500 font-mono text-base">
                  <span id="amountSymbol">$</span>
                </div>
                <input type="number" id="amount" placeholder="0.00" required value="100" min="0.01" step="any" oninput="handleAmountInput()"
                  class="w-full pl-8 pr-16 py-3 bg-zinc-950 border border-zinc-800 rounded-lg focus:outline-none focus:ring-1 focus:ring-accent-500 focus:border-accent-500 text-zinc-100 font-bold text-lg mono-font transition-all">
                <div class="absolute inset-y-0 right-0 pr-3.5 flex items-center pointer-events-none">
                  <span id="fromBadge" class="text-xs font-bold text-zinc-500 bg-zinc-900 border border-zinc-800 px-2 py-0.5 rounded font-mono">USD</span>
                </div>
              </div>
            </div>

            <!-- Currency Drops Grid -->
            <div class="grid grid-cols-1 md:grid-cols-9 gap-2 items-center pt-2">
              
              <!-- Source Dropdown Wrapper -->
              <div class="md:col-span-4 relative">
                <label for="fromCurrency" class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1.5">Source Asset</label>
                <div class="relative">
                  <select id="fromCurrency" onchange="handleCurrencyChange()"
                    class="w-full px-3 py-2.5 pl-9 bg-zinc-950 border border-zinc-800 rounded-lg focus:outline-none focus:ring-1 focus:ring-accent-500 focus:border-accent-500 text-zinc-200 font-medium text-xs cursor-pointer appearance-none transition-all">
                    <!-- Injected dynamically -->
                  </select>
                  <div class="absolute left-3 top-1/2 -translate-y-1/2 flex items-center pointer-events-none">
                    <span id="fromFlag" class="text-sm">🇺🇸</span>
                  </div>
                  <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-zinc-500">
                    <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
                  </div>
                </div>
              </div>

              <!-- Swap Button -->
              <div class="md:col-span-1 flex justify-center pt-3 md:pt-4">
                <button onclick="swapCurrencies()" title="Invert Direction"
                  class="p-2.5 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-300 border border-zinc-700/50 active:scale-95 transition-all">
                  <i data-lucide="arrow-left-right" class="w-4 h-4 md:rotate-90"></i>
                </button>
              </div>

              <!-- Target Dropdown Wrapper -->
              <div class="md:col-span-4 relative">
                <label for="toCurrency" class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1.5">Target Asset</label>
                <div class="relative">
                  <select id="toCurrency" onchange="handleCurrencyChange()"
                    class="w-full px-3 py-2.5 pl-9 bg-zinc-950 border border-zinc-800 rounded-lg focus:outline-none focus:ring-1 focus:ring-accent-500 focus:border-accent-500 text-zinc-200 font-medium text-xs cursor-pointer appearance-none transition-all">
                    <!-- Injected dynamically -->
                  </select>
                  <div class="absolute left-3 top-1/2 -translate-y-1/2 flex items-center pointer-events-none">
                    <span id="toFlag" class="text-sm">🇱🇰</span>
                  </div>
                  <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-zinc-500">
                    <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
                  </div>
                </div>
              </div>

            </div>
          </div>

          <!-- Clean calculation outputs block -->
          <div class="mt-6 bg-zinc-950 p-4 rounded-lg border border-zinc-800/80">
            <div class="flex items-center justify-between mb-2">
              <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Active Calculations</span>
              <span id="rateLabel" class="text-[10px] font-mono text-accent-500 font-semibold bg-accent-500/10 px-2 py-0.5 rounded">1 FROM = X TO</span>
            </div>
            
            <div id="outputArea" class="flex flex-col gap-1 min-h-[50px] justify-center">
              <!-- JS-populated result calculations -->
            </div>
          </div>

          <!-- Flat Primary Trigger -->
          <div class="mt-4">
            <button onclick="commitAndSaveConversion()"
              class="w-full bg-accent-600 hover:bg-accent-700 active:scale-[0.99] text-zinc-100 font-semibold py-3 px-4 rounded-lg text-xs transition duration-150 flex items-center justify-center gap-1.5 border border-accent-500/20">
              <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
              Post Ledger Entry
            </button>
          </div>

        </div>

        <!-- Global Parity Indices Mini-Grid -->
        <div class="bg-zinc-900 rounded-lg p-4 border border-zinc-800">
          <div class="flex items-center justify-between mb-3">
            <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider block">Live Global Parity Index</span>
            <span class="text-[9px] text-zinc-500 font-mono" id="parityBaseBadge">BASE: USD</span>
          </div>
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-2" id="parityGrid">
            <!-- Loaded dynamically via JavaScript -->
          </div>
        </div>

      </section>

      <!-- Right Column: Ledger Index -->
      <section class="lg:col-span-5">
        <div class="bg-zinc-900 rounded-lg p-5 border border-zinc-800">
          
          <!-- History Header -->
          <div class="flex items-center justify-between mb-4 pb-3 border-b border-zinc-800">
            <div>
              <div class="flex items-center gap-2">
                <i data-lucide="database" class="w-4 h-4 text-zinc-400"></i>
                <h3 class="text-sm font-bold tracking-tight text-zinc-200">Ledger Archive</h3>
              </div>
              <p class="text-[10px] text-zinc-500 mt-0.5" id="historyCounter">0 logs archived</p>
            </div>
            
            <button onclick="clearAllHistory()" title="Wipe Entire Ledger File"
              class="p-1.5 text-zinc-500 hover:text-red-400 hover:bg-zinc-800 rounded transition-all">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>

          <!-- Minimal Filtering Input -->
          <div class="mb-3 relative">
            <input type="text" id="historySearch" oninput="filterHistory()" placeholder="Search transactions..."
              class="w-full pl-8 pr-4 py-2 bg-zinc-950 border border-zinc-800 rounded-lg focus:outline-none focus:ring-1 focus:ring-accent-500 text-xs text-zinc-300 transition-all">
            <div class="absolute left-2.5 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none">
              <i data-lucide="search" class="w-3.5 h-3.5"></i>
            </div>
          </div>

          <!-- Ledger entry stack -->
          <div class="max-h-[380px] overflow-y-auto space-y-2 pr-1" id="historyList">
            <!-- Dynamic list items populate here -->
          </div>

        </div>
      </section>

    </div>
  </main>

  <!-- Notification Toaster -->
  <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none max-w-xs w-full"></div>

  <script>
    let soundEnabled = true;

    // Flat baseline metadata parameters mapped by key values
    const CURRENCY_METADATA = {
      USD: { flag: '🇺🇸', name: 'US Dollar', symbol: '$', rateToUSD: 1.0 },
      LKR: { flag: '🇱🇰', name: 'Sri Lankan Rupee', symbol: 'Rs', rateToUSD: 300.5 },
      EUR: { flag: '🇪🇺', name: 'Euro', symbol: '€', rateToUSD: 0.92 },
      GBP: { flag: '🇬🇧', name: 'British Pound', symbol: '£', rateToUSD: 0.78 },
      INR: { flag: '🇮🇳', name: 'Indian Rupee', symbol: '₹', rateToUSD: 83.4 },
      JPY: { flag: '🇯🇵', name: 'Japanese Yen', symbol: '¥', rateToUSD: 155.2 },
      AUD: { flag: '🇦🇺', name: 'Australian Dollar', symbol: 'A$', rateToUSD: 1.51 },
      CAD: { flag: '🇨🇦', name: 'Canadian Dollar', symbol: 'C$', rateToUSD: 1.37 },
      SGD: { flag: '🇸🇬', name: 'Singapore Dollar', symbol: 'S$', rateToUSD: 1.35 },
      CNY: { flag: '🇨🇳', name: 'Chinese Yuan', symbol: '¥', rateToUSD: 7.25 }
    };

    const CONVERT_URL = '/api/convert';

    // Simple, solid Web Audio Synthesizer interface (Tactile sound feedback)
    function playSound(type) {
      if (!soundEnabled) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        if (type === 'click') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(400, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.08);
          gain.gain.setValueAtTime(0.03, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
          osc.start();
          osc.stop(ctx.currentTime + 0.08);
        } else if (type === 'success') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(500, ctx.currentTime); 
          osc.frequency.setValueAtTime(650, ctx.currentTime + 0.06); 
          gain.gain.setValueAtTime(0.04, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
          osc.start();
          osc.stop(ctx.currentTime + 0.2);
        } else if (type === 'delete') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 0.12);
          gain.gain.setValueAtTime(0.03, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
          osc.start();
          osc.stop(ctx.currentTime + 0.12);
        }
      } catch (e) {
        console.warn('Audio output bypassed.', e);
      }
    }

    // Window Init Routine
    window.onload = function() {
      lucide.createIcons();
      populateDropdowns();
      renderCalculation();
      renderHistory();
      renderParityGrid();
    };

    // Populate simplified dark dropdown elements
    function populateDropdowns() {
      const fromSelect = document.getElementById('fromCurrency');
      const toSelect = document.getElementById('toCurrency');
      
      fromSelect.innerHTML = '';
      toSelect.innerHTML = '';

      Object.keys(CURRENCY_METADATA).forEach(key => {
        const item = CURRENCY_METADATA[key];
        const optionFrom = document.createElement('option');
        optionFrom.value = key;
        optionFrom.className = "bg-zinc-950 text-zinc-100 font-mono text-xs";
        optionFrom.innerText = `${key} — ${item.name}`;
        fromSelect.appendChild(optionFrom);

        const optionTo = document.createElement('option');
        optionTo.value = key;
        optionTo.className = "bg-zinc-950 text-zinc-100 font-mono text-xs";
        optionTo.innerText = `${key} — ${item.name}`;
        toSelect.appendChild(optionTo);
      });

      fromSelect.value = 'USD';
      toSelect.value = 'LKR';
      
      updateSelectionBadges();
    }

    function updateSelectionBadges() {
      const fromVal = document.getElementById('fromCurrency').value;
      const toVal = document.getElementById('toCurrency').value;
      
      document.getElementById('fromFlag').innerText = CURRENCY_METADATA[fromVal].flag;
      document.getElementById('toFlag').innerText = CURRENCY_METADATA[toVal].flag;
      document.getElementById('amountSymbol').innerText = CURRENCY_METADATA[fromVal].symbol;
      document.getElementById('fromBadge').innerText = fromVal;
      document.getElementById('parityBaseBadge').innerText = `BASE: ${fromVal}`;

      // Sync the inline metrics banner states
      document.getElementById('metricBase').innerText = `${fromVal} ${CURRENCY_METADATA[fromVal].flag}`;
      const crossRate = calculateCrossRate(fromVal, toVal, 1).rate;
      document.getElementById('metricRate').innerText = `${crossRate.toFixed(2)} ${toVal}`;
    }

    // Events Handlers
    function handleAmountInput() {
      renderCalculation();
    }

    function handleCurrencyChange() {
      playSound('click');
      updateSelectionBadges();
      renderCalculation();
      renderParityGrid();
    }

    function swapCurrencies() {
      playSound('click');
      const fromSelect = document.getElementById('fromCurrency');
      const toSelect = document.getElementById('toCurrency');
      const temp = fromSelect.value;
      
      fromSelect.value = toSelect.value;
      toSelect.value = temp;

      updateSelectionBadges();
      renderCalculation();
      renderParityGrid();
    }

    function calculateCrossRate(from, to, amount) {
      if (from === to) return { rate: 1.0, result: amount };
      
      const fromToUSD = CURRENCY_METADATA[from].rateToUSD;
      const toToUSD = CURRENCY_METADATA[to].rateToUSD;

      const amountInUSD = amount / fromToUSD;
      const targetVal = amountInUSD * toToUSD;
      const crossRate = toToUSD / fromToUSD;

      return {
        rate: crossRate,
        result: targetVal
      };
    }

    function resetInputs() {
      playSound('click');
      document.getElementById('amount').value = "100";
      document.getElementById('fromCurrency').value = "USD";
      document.getElementById('toCurrency').value = "LKR";
      
      updateSelectionBadges();
      renderCalculation();
      renderParityGrid();
      showToast('Converter parameters reset', 'info');
    }

    function loadFastPair(from, to) {
      playSound('click');
      document.getElementById('fromCurrency').value = from;
      document.getElementById('toCurrency').value = to;
      
      updateSelectionBadges();
      renderCalculation();
      renderParityGrid();
    }

    // Toggle Sound Option
    function toggleSound() {
      soundEnabled = !soundEnabled;
      const iconElement = document.getElementById('soundIcon');
      if (soundEnabled) {
        iconElement.setAttribute('data-lucide', 'volume-2');
        showToast('Synth audio feedback active', 'info');
        playSound('click');
      } else {
        iconElement.setAttribute('data-lucide', 'volume-x');
        showToast('Synth audio feedback muted', 'info');
      }
      lucide.createIcons();
    }

    // Main Display rendering computations
    function renderCalculation() {
      const amountInput = parseFloat(document.getElementById('amount').value);
      const fromVal = document.getElementById('fromCurrency').value;
      const toVal = document.getElementById('toCurrency').value;
      const outputArea = document.getElementById('outputArea');

      if (isNaN(amountInput) || amountInput <= 0) {
        outputArea.innerHTML = `
          <div class="text-red-400 font-mono text-xs flex items-center gap-1.5 justify-center py-2">
            <i data-lucide="alert-circle" class="w-4 h-4"></i>
            <span>INPUT A POSITIVE NUMERIC VALUE</span>
          </div>`;
        lucide.createIcons();
        return;
      }

      const calc = calculateCrossRate(fromVal, toVal, amountInput);
      const formattedAmount = amountInput.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const formattedResult = calc.result.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 });
      
      document.getElementById('rateLabel').innerText = `1 ${fromVal} = ${calc.rate.toFixed(4)} ${toVal}`;

      outputArea.innerHTML = `
        <span class="text-zinc-500 font-mono text-[9px] uppercase tracking-wider block">${formattedAmount} ${fromVal} equivalent rate</span>
        <div class="text-xl font-bold tracking-tight text-zinc-100 mt-0.5">
          <span class="mono-font">${CURRENCY_METADATA[toVal].symbol} ${formattedResult}</span>
          <span class="text-xs text-zinc-500 font-mono font-medium ml-1 bg-zinc-900 border border-zinc-800 px-1.5 py-0.5 rounded">${toVal}</span>
        </div>
      `;

      // Threshold reporting limits check
      const checkInUSD = amountInput / CURRENCY_METADATA[fromVal].rateToUSD;
      if (checkInUSD >= 5000) {
        outputArea.innerHTML += `
          <div class="mt-2 p-2 bg-yellow-500/10 border border-yellow-500/20 text-yellow-500 rounded text-[10px] font-mono flex items-center gap-1.5">
            <i data-lucide="shield-alert" class="w-3.5 h-3.5 flex-shrink-0"></i>
            <span>EXCEEDS $5K USD MONITORING THRESHOLD</span>
          </div>
        `;
        lucide.createIcons();
      }
    }

    function renderParityGrid() {
      const grid = document.getElementById('parityGrid');
      grid.innerHTML = '';
      
      const fromVal = document.getElementById('fromCurrency').value;
      const comparisonList = ['USD', 'EUR', 'GBP', 'JPY', 'INR', 'LKR'].filter(cur => cur !== fromVal).slice(0, 4);
      
      comparisonList.forEach(target => {
        const calc = calculateCrossRate(fromVal, target, 1);
        const card = document.createElement('div');
        card.className = "p-2 bg-zinc-950 border border-zinc-800 rounded flex flex-col justify-between";
        card.innerHTML = `
          <div class="flex items-center justify-between">
            <span class="text-[10px] font-bold text-zinc-400">${CURRENCY_METADATA[target].flag} ${target}</span>
            <span class="text-[9px] text-zinc-600 font-mono font-bold">${CURRENCY_METADATA[target].symbol}</span>
          </div>
          <div class="mt-1 text-xs font-bold text-zinc-200 font-mono tracking-tight">${calc.rate.toFixed(3)}</div>
        `;
        grid.appendChild(card);
      });
    }

    // Ledger Engine Actions
    function getStoredHistory() {
      const items = localStorage.getItem('apex_lite_history');
      return items ? JSON.parse(items) : [];
    }

    function saveStoredHistory(list) {
      localStorage.setItem('apex_lite_history', JSON.stringify(list));
      syncLedgerMetrics(list);
    }

    function syncLedgerMetrics(list) {
      document.getElementById('metricCount').innerText = list.length;
      
      let totalUSD = 0;
      list.forEach(item => {
        const rateToUSD = CURRENCY_METADATA[item.from]?.rateToUSD || 1.0;
        totalUSD += (item.amount / rateToUSD);
      });
      
      document.getElementById('metricVolume').innerText = `$${totalUSD.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
    }

    // Archive Conversion to local store ledger
    async function commitAndSaveConversion() {
      const amountInput = parseFloat(document.getElementById('amount').value);
      const fromVal = document.getElementById('fromCurrency').value;
      const toVal = document.getElementById('toCurrency').value;

      if (isNaN(amountInput) || amountInput <= 0) {
        showToast('Provide a valid non-zero amount to store', 'warning');
        return;
      }

      const calc = calculateCrossRate(fromVal, toVal, amountInput);
      
      let systemId = 'TX-' + Math.floor(100000 + Math.random() * 900000);
      let timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ' | ' + new Date().toLocaleDateString([], { month: 'short', day: 'numeric' });

      // Simulator bridge
      try {
        const res = await fetch(`${CONVERT_URL}?amount=${amountInput}&from=${fromVal}&to=${toVal}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        if (res.ok) {
          const apiResponse = await res.json();
          systemId = apiResponse.id || systemId;
          timestamp = apiResponse.timestamp || timestamp;
        }
      } catch (err) {
        // Safe offline sandbox operations 
      }

      const currentList = getStoredHistory();
      const newItem = {
        id: systemId,
        from: fromVal,
        to: toVal,
        amount: amountInput,
        result: calc.result,
        rate: calc.rate,
        timestamp: timestamp
      };

      currentList.unshift(newItem);
      saveStoredHistory(currentList);
      
      playSound('success');
      showToast(`Logged successfully: ${systemId}`, 'success');
      renderHistory();
    }

    function renderHistory() {
      const list = getStoredHistory();
      const container = document.getElementById('historyList');
      const counterLabel = document.getElementById('historyCounter');
      
      counterLabel.innerText = `${list.length} transactions stored`;
      syncLedgerMetrics(list);

      if (list.length === 0) {
        container.innerHTML = `
          <div class="text-center py-8 text-zinc-600">
            <div class="w-8 h-8 bg-zinc-950 rounded-full flex items-center justify-center mx-auto mb-2.5">
              <i data-lucide="database" class="w-4 h-4 text-zinc-700"></i>
            </div>
            <p class="text-xs font-mono">Archive is empty</p>
            <p class="text-[9px] text-zinc-500 mt-1">Calculations will record here on post</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      let innerHTML = '';
      list.forEach((item, index) => {
        const fromSymbol = CURRENCY_METADATA[item.from]?.symbol || '';
        const toSymbol = CURRENCY_METADATA[item.to]?.symbol || '';

        innerHTML += `
          <div class="p-3 bg-zinc-950 border border-zinc-800/80 rounded hover:border-zinc-700 group transition-all flex flex-col gap-1">
            <div class="flex items-center justify-between">
              <span class="font-mono text-[9px] bg-zinc-900 text-zinc-400 border border-zinc-800 px-1.5 py-0.5 rounded font-bold">${item.id}</span>
              <span class="text-[9px] text-zinc-500 font-mono">${item.timestamp}</span>
            </div>
            
            <div class="flex items-center justify-between gap-2 mt-1">
              <div class="cursor-pointer flex-1" onclick="restoreHistoryItem(${index})" title="Click to load into calculations">
                <div class="text-xs font-bold text-zinc-300">
                  <span class="mono-font">${fromSymbol}${item.amount.toLocaleString(undefined, {maximumFractionDigits: 2})}</span> 
                  <span class="text-zinc-500 font-normal">➔</span>
                  <span class="text-accent-500 mono-font">${toSymbol}${item.result.toLocaleString(undefined, {maximumFractionDigits: 2})}</span>
                </div>
                <div class="text-[9px] text-zinc-500 font-mono mt-0.5">Rate: 1 ${item.from} = ${item.rate.toFixed(4)} ${item.to}</div>
              </div>
              
              <div class="flex items-center gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity">
                <button onclick="restoreHistoryItem(${index})" title="Restore Parameters" class="p-1 text-zinc-400 hover:text-accent-500 hover:bg-zinc-900 rounded transition">
                  <i data-lucide="corner-down-left" class="w-3.5 h-3.5"></i>
                </button>
                <button onclick="deleteHistoryItem(${index})" title="Delete entry" class="p-1 text-zinc-400 hover:text-red-400 hover:bg-zinc-900 rounded transition">
                  <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                </button>
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = innerHTML;
      lucide.createIcons();
    }

    function restoreHistoryItem(index) {
      playSound('click');
      const list = getStoredHistory();
      const item = list[index];
      if (!item) return;

      document.getElementById('amount').value = item.amount;
      document.getElementById('fromCurrency').value = item.from;
      document.getElementById('toCurrency').value = item.to;

      updateSelectionBadges();
      renderCalculation();
      renderParityGrid();
      showToast(`Loaded details for: ${item.id}`, 'info');
    }

    function deleteHistoryItem(index) {
      playSound('delete');
      const list = getStoredHistory();
      list.splice(index, 1);
      saveStoredHistory(list);
      renderHistory();
      showToast('Record deleted from local ledger', 'info');
    }

    function clearAllHistory() {
      playSound('delete');
      saveStoredHistory([]);
      renderHistory();
      showToast('Ledger wiped completely', 'info');
    }

    function filterHistory() {
      const searchVal = document.getElementById('historySearch').value.toLowerCase();
      const items = document.querySelectorAll('#historyList > div');

      items.forEach(item => {
        const text = item.innerText.toLowerCase();
        if (text.includes(searchVal)) {
          item.style.display = 'flex';
        } else {
          item.style.display = 'none';
        }
      });
    }

    // Modern clean minimal status alerts Toaster
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      
      toast.className = `p-3 rounded border text-xs font-semibold font-mono flex items-center gap-2 transition-all duration-200 transform translate-y-1 opacity-0 pointer-events-auto select-none`;
      
      let icon = 'info';
      if (type === 'success') {
        toast.className += ` bg-zinc-900 text-emerald-400 border-emerald-500/20`;
        icon = 'check-circle';
      } else if (type === 'warning') {
        toast.className += ` bg-zinc-900 text-amber-500 border-amber-500/20`;
        icon = 'alert-triangle';
      } else {
        toast.className += ` bg-zinc-900 text-zinc-300 border-zinc-800`;
        icon = 'info';
      }

      toast.innerHTML = `
        <i data-lucide="${icon}" class="w-4 h-4 flex-shrink-0"></i>
        <span>${message}</span>
      `;
      
      container.appendChild(toast);
      lucide.createIcons();

      setTimeout(() => {
        toast.classList.remove('translate-y-1', 'opacity-0');
      }, 30);

      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-1');
        setTimeout(() => { toast.remove(); }, 200);
      }, 2500);
    }
  </script>

</body>
